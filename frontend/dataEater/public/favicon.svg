<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="white"/>
  <!-- Head -->
  <rect x="3" y="4" width="9" height="8" rx="2" fill="#111"/>
  <!-- Snout -->
  <rect x="10" y="6" width="8" height="4" rx="2" fill="#111"/>
  <!-- Neck -->
  <rect x="7" y="10" width="6" height="4" rx="1" fill="#111"/>
  <!-- Body -->
  <rect x="9" y="13" width="13" height="9" rx="3" fill="#111"/>
  <!-- Tail -->
  <polygon points="22,14 22,21 29,17" fill="#111"/>
  <!-- Front leg -->
  <rect x="10" y="21" width="3" height="8" rx="1" fill="#111"/>
  <!-- Back leg -->
  <rect x="17" y="21" width="3" height="8" rx="1" fill="#111"/>
  <!-- Eye -->
  <circle cx="7" cy="7" r="1.3" fill="white"/>
</svg>
